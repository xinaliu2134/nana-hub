<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holland Kids Explorer · 荷兰亲子探索</title>
  <meta name="description" content="Holland Kids Explorer: 500+ family-friendly venues across the Netherlands. Interactive bilingual map for Dutch Chinese families with kids.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧒</text></svg>">
  <link rel="canonical" href="https://xinaliu2134.github.io/nana-hub/holland-kids-explorer.html">
  <meta property="og:title" content="Holland Kids Explorer · 荷兰亲子探索">
  <meta property="og:description" content="500+ family-friendly venues across the Netherlands. Interactive bilingual map for families.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://xinaliu2134.github.io/nana-hub/holland-kids-explorer.html">
  <meta name="twitter:card" content="summary">
  <link rel="preload" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" as="script">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <style>
    :root {
      --bg:           #F2F4F8;
      --surface:      #FFFFFF;
      --primary:      #E05A1E;
      --primary-light:#FFF0E9;
      --primary-dark: #B84515;
      --navy:         #1A2B4A;
      --teal:         #0EA5A0;
      --text:         #1A2B4A;
      --text-secondary: #5A6A84;
      --text-muted:   #9AA5B8;
      --border:       #CBD5E1;
      --border-light: #E2E8F0;
      --shadow-sm:    0 1px 3px rgba(26,43,74,.12), 0 0 0 1px rgba(26,43,74,.04);
      --shadow-md:    0 4px 12px rgba(26,43,74,.16), 0 0 0 1px rgba(26,43,74,.06);
      --shadow-lg:    0 8px 24px rgba(26,43,74,.20), 0 0 0 1px rgba(26,43,74,.08);
      --radius-sm:    6px;
      --radius-md:    12px;
      --radius-lg:    18px;
      --radius-xl:    24px;
      font-family: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ─────────────────────────────────── */
    header {
      background: var(--navy);
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--primary);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }
    .logo-text-en {
      font-size: 13px; font-weight: 700;
      color: #FFFFFF; letter-spacing: .5px;
    }
    .logo-text-zh {
      font-size: 11px; font-weight: 400;
      color: rgba(255,255,255,.55);
    }

    .header-search {
      flex: 1;
      max-width: 480px;
      position: relative;
    }
    .header-search input {
      width: 100%;
      background: rgba(255,255,255,.12);
      border: 2px solid rgba(255,255,255,.2);
      border-radius: var(--radius-md);
      padding: 8px 40px 8px 36px;
      font-size: 14px;
      color: #fff;
      outline: none;
      transition: background .2s, border-color .2s;
    }
    .header-search input::placeholder { color: rgba(255,255,255,.5); }
    .header-search input:focus {
      background: rgba(255,255,255,.18);
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(224,90,30,.25);
    }
    .header-search .search-icon {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,.45); font-size: 15px;
      pointer-events: none;
    }
    .header-search .clear-btn {
      position: absolute; right: 8px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.4); font-size: 16px;
      padding: 2px 4px; display: none;
      transition: color .15s;
    }
    .header-search .clear-btn:hover { color: rgba(255,255,255,.8); }
    .header-search input:not(:placeholder-shown) ~ .clear-btn { display: block; }

    /* Autocomplete dropdown */
    .autocomplete {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      max-height: 240px; overflow-y: auto;
      z-index: 200; display: none;
    }
    .autocomplete.open { display: block; }
    .autocomplete-item {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      display: flex; align-items: center; gap: 8px;
      transition: background .12s;
    }
    .autocomplete-item:hover, .autocomplete-item.focused {
      background: var(--primary-light);
    }
    .autocomplete-item .region-type {
      margin-left: auto;
      font-size: 11px; color: var(--text-muted);
    }

    .header-spacer { flex: 1; }

    .lang-toggle {
      display: flex;
      background: rgba(255,255,255,.1);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }
    .lang-btn {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.5);
      font-size: 12px; font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      transition: background .15s, color .15s;
    }
    .lang-btn.active {
      background: var(--primary);
      color: #fff;
    }

    /* ── FILTERS ─────────────────────────────────── */
    .filter-bar {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 0 20px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-label {
      font-size: 12px; font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .filter-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 2px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: 12px; font-weight: 600;
      color: var(--text-secondary);
      white-space: nowrap;
      flex-shrink: 0;
      transition: all .15s;
      user-select: none;
    }
    .filter-chip:hover { border-color: var(--primary); color: var(--primary); }
    .filter-chip.active {
      color: #fff;
      border-color: transparent;
    }
    .filter-chip.no-data {
      opacity: 0.45;
      cursor: default;
      pointer-events: none;
    }
    .filter-chip.no-data:hover { border-color: var(--border); color: var(--text-secondary); }

    /* ── MAIN LAYOUT ─────────────────────────────── */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 380px 1fr;
      overflow: hidden;
    }

    /* ── SIDEBAR ─────────────────────────────────── */
    .sidebar {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 2px solid var(--border);
    }

    .sidebar-header {
      padding: 16px 20px 12px;
      background: var(--surface);
      border-bottom: 2px solid var(--border-light);
      flex-shrink: 0;
    }
    .result-count {
      font-size: 13px; color: var(--text-secondary);
    }
    .result-count strong { color: var(--text); }

    .venue-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      contain: layout style;
      will-change: scroll-position;
    }
    .venue-list::-webkit-scrollbar { width: 4px; }
    .venue-list::-webkit-scrollbar-track { background: transparent; }
    .venue-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Venue card */
    .venue-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 14px;
      border: none;
      cursor: pointer;
      transition: box-shadow .15s, transform .12s;
      box-shadow: var(--shadow-sm);
      contain: content;
    }
    .venue-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }
    .venue-card.active {
      box-shadow: 0 0 0 2px var(--primary), var(--shadow-md);
    }

    .venue-card-top {
      display: flex; align-items: flex-start; gap: 11px;
    }
    .venue-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .venue-info { flex: 1; min-width: 0; }
    .venue-name {
      font-size: 14px; font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .venue-name-zh {
      font-size: 12px; color: var(--text-secondary);
      margin-top: 2px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
    }
    .venue-meta {
      margin-top: 8px;
      display: flex; align-items: center; gap: 6px;
      flex-wrap: wrap;
    }
    .venue-tag {
      font-size: 11px; font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-block;
    }
    .venue-address {
      font-size: 11px; color: var(--text-muted);
      display: flex; align-items: center; gap: 4px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .venue-address svg { flex-shrink: 0; }

    .venue-actions {
      margin-top: 10px;
      display: flex; gap: 6px;
    }
    .btn-website {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600;
      color: var(--primary);
      background: var(--primary-light);
      border: none; border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s;
    }
    .btn-website:hover { background: #fde0cd; }
    .btn-map {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600;
      color: var(--text-secondary);
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .btn-map:hover { border-color: var(--primary); color: var(--primary); }
    .btn-nav {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600;
      color: #fff;
      background: #4285F4;
      border: none;
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s;
    }
    .btn-nav:hover { background: #3367D6; }

    /* Load more */
    .load-more-btn {
      margin: 8px 0 16px;
      width: 100%;
      padding: 10px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 13px; font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all .15s;
    }
    .load-more-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* Skeleton — subtle, no visible card frame */
    .skeleton {
      background: linear-gradient(90deg, var(--bg) 25%, #f0f2f5 50%, var(--bg) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-card {
      padding: 14px;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px;
      text-align: center;
      gap: 12px;
    }
    .empty-state-icon { font-size: 48px; }
    .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text); }
    .empty-state p { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
    .empty-suggestions {
      display: flex; flex-wrap: wrap; gap: 6px;
      justify-content: center;
      margin-top: 8px;
    }
    .empty-suggestion {
      background: var(--primary-light); color: var(--primary);
      border: none; border-radius: 20px;
      padding: 5px 14px; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: background .15s;
    }
    .empty-suggestion:hover { background: #fde0cd; }

    /* ── MAP ─────────────────────────────────────── */
    #map {
      width: 100%; height: 100%;
      z-index: 1;
    }

    /* Leaflet popup overrides */
    .leaflet-popup-content-wrapper {
      border-radius: var(--radius-md) !important;
      box-shadow: var(--shadow-lg) !important;
      border: 2px solid var(--border);
      padding: 0 !important;
      overflow: hidden;
    }
    .leaflet-popup-content {
      margin: 0 !important;
      width: 260px !important;
    }
    .leaflet-popup-tip-container { margin-top: -1px; }

    .popup-content {
      padding: 14px;
    }
    .popup-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .popup-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 18px; flex-shrink: 0;
    }
    .popup-name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .popup-name-zh { font-size: 12px; color: var(--text-secondary); }
    .popup-address {
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 10px; line-height: 1.4;
    }
    .popup-website {
      display: block; text-align: center;
      background: var(--primary); color: white;
      border-radius: 8px; padding: 7px;
      font-size: 12px; font-weight: 600;
      text-decoration: none;
      transition: background .15s;
    }
    .popup-website:hover { background: var(--primary-dark); }

    /* Custom map marker */
    .map-marker {
      width: 34px; height: 34px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2.5px solid #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,.35), 0 0 0 1px rgba(0,0,0,.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform .2s;
    }
    .map-marker:hover {
      transform: rotate(-45deg) scale(1.3);
      z-index: 1000 !important;
    }
    .map-marker-inner {
      transform: rotate(45deg);
      font-size: 14px;
      line-height: 1;
    }

    /* Map loading overlay */
    .map-overlay {
      position: absolute; inset: 0;
      background: rgba(242,244,248,.85);
      backdrop-filter: blur(4px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 500; gap: 12px;
      transition: opacity .3s;
    }
    .map-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .map-overlay p { font-size: 14px; color: var(--text-secondary); }

    /* Map wrapper */
    .map-wrapper { position: relative; }

    /* ── TOAST NOTIFICATION ─────────────────────── */
    .toast {
      position: fixed;
      top: 76px; left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--navy);
      color: #fff;
      padding: 10px 20px;
      border-radius: var(--radius-md);
      font-size: 13px; font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }

    /* ── SCROLL TO TOP ──────────────────────────── */
    .scroll-top-btn {
      position: absolute;
      bottom: 18px; right: 18px;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      border: none;
      box-shadow: var(--shadow-md);
      cursor: pointer;
      font-size: 18px;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      transition: background .15s, transform .15s;
    }
    .scroll-top-btn:hover { background: var(--primary-dark); transform: scale(1.1); }
    .scroll-top-btn.visible { display: flex; }

    /* ── VENUE DETAIL EXTRAS ────────────────────── */
    .venue-detail-row {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--text-muted);
      margin-top: 4px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .venue-detail-row a {
      color: var(--primary); text-decoration: none;
    }
    .venue-detail-row a:hover { text-decoration: underline; }

    /* ── CATEGORY SUMMARY ───────────────────────── */
    .category-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 8px;
    }
    .category-summary-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 10px;
    }

    /* ── FILTER CHIP COUNT BADGE ─────────────────── */
    .filter-chip-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      font-size: 10px;
      font-weight: 700;
      padding: 0 5px;
      line-height: 1;
    }
    .filter-chip:not(.active) .filter-chip-count {
      background: var(--bg);
      color: var(--text-secondary);
    }
    .filter-chip.active .filter-chip-count {
      background: rgba(255,255,255,.25);
      color: #fff;
    }

    /* ── FAVORITE BUTTON ────────────────────────── */
    .venue-fav-btn {
      position: absolute; top: 10px; right: 10px;
      background: none; border: none;
      font-size: 20px; cursor: pointer;
      opacity: 0.5; transition: opacity .15s, transform .15s;
      line-height: 1; padding: 2px;
      z-index: 2;
    }
    .venue-fav-btn:hover { opacity: 0.8; }
    .venue-fav-btn.favorited { opacity: 1; }
    .venue-fav-btn.bounce {
      animation: favBounce .35s ease;
    }
    @keyframes favBounce {
      0% { transform: scale(1); }
      40% { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
    .venue-card { position: relative; }

    /* ── DISTANCE BADGE ──────────────────────────── */
    .venue-distance {
      font-size: 11px; color: var(--teal); font-weight: 600;
      display: inline-flex; align-items: center; gap: 3px;
    }

    /* ── NEAR ME BUTTON ──────────────────────────── */
    .nearme-btn {
      background: none; border: none;
      color: rgba(255,255,255,.5);
      font-size: 20px; cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: color .15s, background .15s;
      flex-shrink: 0;
    }
    .nearme-btn:hover { color: #fff; background: rgba(255,255,255,.1); }
    .nearme-btn.active { color: #4FC3F7; }

    /* ── AUTOCOMPLETE VENUE RESULT ────────────────── */
    .autocomplete-item .venue-result-detail {
      font-size: 11px; color: var(--text-muted);
      margin-left: 4px;
    }
    .autocomplete-item .venue-emoji {
      font-size: 16px; flex-shrink: 0;
    }
    .autocomplete-section-label {
      padding: 6px 14px 2px;
      font-size: 10px; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    /* ── RESPONSIVE ──────────────────────────────── */
    @media (max-width: 768px) {
      .main { grid-template-columns: 1fr; grid-template-rows: 50vh 1fr; }
      .map-wrapper { order: -1; }
      .sidebar { border-right: none; border-top: 2px solid var(--border); }
      .header-search { max-width: 100%; }
      .logo-text { display: none; }
    }

    /* ── AI CHAT WIDGET ────────────────────────────── */
    .chat-fab {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #F39C12);
      color: #fff;
      border: none;
      box-shadow: 0 4px 16px rgba(224,90,30,.4);
      cursor: pointer;
      font-size: 24px;
      display: flex; align-items: center; justify-content: center;
      z-index: 9000;
      transition: transform .2s, box-shadow .2s;
    }
    .chat-fab:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(224,90,30,.5); }
    .chat-fab.hidden { display: none; }

// ── OPENING HOURS TRANSLATION ─────────────────────
function translateHours(str) {
  if (!str || LANG.current !== 'zh') return str;
  return str
    .replace(/\bMo\b/g,'周一').replace(/\bTu\b/g,'周二').replace(/\bWe\b/g,'周三')
    .replace(/\bTh\b/g,'周四').replace(/\bFr\b/g,'周五').replace(/\bSa\b/g,'周六').replace(/\bSu\b/g,'周日')
    .replace(/\bMar\b/g,'3月').replace(/\bApr\b/g,'4月').replace(/\bMay\b/g,'5月')
    .replace(/\bJun\b/g,'6月').replace(/\bJul\b/g,'7月').replace(/\bAug\b/g,'8月')
    .replace(/\bSep\b/g,'9月').replace(/\bOct\b/g,'10月').replace(/\bNov\b/g,'11月')
    .replace(/\bDec\b/g,'12月').replace(/\bJan\b/g,'1月').replace(/\bFeb\b/g,'2月')
    .replace(/\(seasonal\)/g,'(季节性开放)')
    .replace(/\(last entry/g,'(最后入场')
    .replace(/closed/gi,'休息')
    .replace(/except holidays/gi,'节假日除外')
    .replace(/daily/gi,'每天');
}

// ── CATEGORY TRANSLATION UTILS ────────────────────
function getCategoryForVenue(tags) {
  // Check all tag keys including natural, historic
  for (const cat of CATEGORIES) {
    for (const [key, vals] of Object.entries(cat.tags)) {
      const val = tags[key];
      if (val && vals.includes(val)) return cat;
    }
  }
  // Extra fallbacks
  if (tags.man_made === 'windmill') return CATEGORIES.find(c => c.id === 'historic');
  if (tags.historic) return CATEGORIES.find(c => c.id === 'historic');
  if (tags.natural === 'beach') return CATEGORIES.find(c => c.id === 'beach');
  if (tags.tourism === 'visitor_centre') return CATEGORIES.find(c => c.id === 'visitor');
  if (tags.amenity === 'arts_centre') return CATEGORIES.find(c => c.id === 'theatre');
  return CATEGORIES[CATEGORIES.length - 1]; // fallback: attraction
}

function getCategoryById(id) {
  return CATEGORIES.find(c => c.id === id) || CATEGORIES[CATEGORIES.length - 1];
}

  const favCount = state.favorites.length;
  const favChip = document.createElement('button');
  favChip.className = 'filter-chip' + (state.showFavoritesOnly ? ' active' : '');
  if (state.showFavoritesOnly) {
    favChip.style.background = '#E05A1E';
    favChip.style.borderColor = '#E05A1E';
  }
  favChip.innerHTML = `❤️ ${T[LANG.current].favoritesLabel}${favCount > 0 ? ` <span class="filter-chip-count">${favCount}</span>` : ''}`;
  favChip.onclick = () => toggleFavoritesFilter();
  bar.appendChild(favChip);

  // All button
  const allChip = document.createElement('button');
  allChip.className = 'filter-chip' + (!state.showFavoritesOnly && state.activeCategory === null ? ' active' : '');
  allChip.style.background = !state.showFavoritesOnly && state.activeCategory === null ? '#1A2B4A' : '';
  allChip.style.borderColor = !state.showFavoritesOnly && state.activeCategory === null ? '#1A2B4A' : '';
  allChip.innerHTML = totalCount > 0
    ? `${T[LANG.current].allLabel} <span class="filter-chip-count">${totalCount}</span>`
    : T[LANG.current].allLabel;
  allChip.onclick = () => setFilter(null);
  bar.appendChild(allChip);

  CATEGORIES.forEach(cat => {
    const count = catCounts[cat.id] || 0;
    const chip = document.createElement('button');
    const isActive = !state.showFavoritesOnly && state.activeCategory === cat.id;
    chip.className = 'filter-chip' + (isActive ? ' active' : '') + (totalCount > 0 && count === 0 ? ' no-data' : '');
    if (isActive) {
      chip.style.background = cat.color;
      chip.style.borderColor = cat.color;
    }
    const countBadge = totalCount > 0 ? ` <span class="filter-chip-count">${count}</span>` : '';
    chip.innerHTML = `${cat.emoji} ${LANG.current === 'zh' ? cat.zh : cat.en}${countBadge}`;
    chip.onclick = () => setFilter(cat.id);
    bar.appendChild(chip);
  });
}

function setFilter(catId) {
  state.activeCategory = catId;
  state.showFavoritesOnly = false;
  state.displayed = 0;
  if (state.allVenues.length === 0) {
    // No region loaded yet — highlight search bar and show a hint in empty state
    buildFilterBar();
    const cat = catId ? CATEGORIES.find(c => c.id === catId) : null;
    const catName = cat ? (LANG.current === 'zh' ? cat.zh : cat.en) : '';
    if (catId && cat) {
      document.getElementById('emptyTitle').textContent =
        LANG.current === 'zh' ? `搜索地区，查看全部${catName}` : `Search a region to browse ${catName}`;
      document.getElementById('emptyDesc').textContent =
        LANG.current === 'zh'
          ? '在上方搜索框输入城市或省份，立即筛选该种类'
          : 'Type a city or province above — results will be filtered to this category.';
    } else {
      updateEmptyStateText();
    }
    searchInput.focus();
    return;
  }
  applyFilter();
  buildFilterBar();
}

function applyFilter() {
  let list = state.activeCategory
    ? state.allVenues.filter(v => v.category.id === state.activeCategory)
    : [...state.allVenues];
  if (state.showFavoritesOnly) {
    list = list.filter(v => state.favorites.includes(v.id));
  }
  // If user location available, compute distances
  if (state.userLocation) {
    list.forEach(v => {
      v._userDist = haversine(state.userLocation[0], state.userLocation[1], v.lat, v.lon);
    });
    list.sort((a, b) => a._userDist - b._userDist);
  }
  state.filtered = list;
  renderList();
  renderMarkers();
}

searchInput.addEventListener('keydown', e => {
  const items = autocompleteEl.querySelectorAll('.autocomplete-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    focusedIdx = Math.min(focusedIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('focused', i === focusedIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    focusedIdx = Math.max(focusedIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('focused', i === focusedIdx));
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (focusedIdx >= 0 && items[focusedIdx]) {
      items[focusedIdx].click();
    } else if (searchInput.value.trim()) {
      searchRegion(searchInput.value.trim());
    }
  } else if (e.key === 'Escape') {
    autocompleteEl.classList.remove('open');
  }
});

document.addEventListener('click', e => {

function renderAutocomplete(regionMatches, q, venueMatches) {
  focusedIdx = -1;
  venueMatches = venueMatches || [];
  if (!regionMatches.length && !venueMatches.length) { autocompleteEl.classList.remove('open'); return; }
  const safeQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  let html = '';
  // Near Me option at the top
  if ('near me'.includes(q) || '我附近'.includes(q) || 'nearme'.includes(q.replace(/\s/g,''))) {
    html += `<div class="autocomplete-item" onclick="activateNearMe()">
      <span class="venue-emoji">📍</span>
      <span>Near Me ${LANG.current === 'zh' ? '我附近' : ''}</span>
      <span class="region-type">${LANG.current === 'zh' ? '定位' : 'Location'}</span>
    </div>`;
  }
  // Venue results
  if (venueMatches.length > 0) {
    html += `<div class="autocomplete-section-label">${LANG.current === 'zh' ? '场地' : 'Venues'}</div>`;
    html += venueMatches.map(v => {
      const safeName = escapeHtml(v.name);
      const highlighted = safeName.replace(
        new RegExp(`(${safeQ})`, 'gi'),
        '<strong style="color:var(--primary)">$1</strong>'
      );
      return `<div class="autocomplete-item" data-venue-lat="${v.lat}" data-venue-lon="${v.lon}" data-venue-id="${v.id}" onclick="searchVenueFromAutocomplete(${v.lat},${v.lon},'${v.id.replace(/'/g,"\\'")}','${v.name.replace(/'/g,"\\'")}')">
        <span class="venue-emoji">${v.emoji}</span>
        <span>${highlighted}<span class="venue-result-detail"> · ${v.city}</span></span>
        <span class="region-type">${v.catLabel}</span>
      </div>`;
    }).join('');
  }
  // Region results
  if (regionMatches.length > 0) {
    html += `<div class="autocomplete-section-label">${LANG.current === 'zh' ? '地区' : 'Regions'}</div>`;
    html += regionMatches.map(r => {
      const safeName = escapeHtml(r.name);
      const highlighted = safeName.replace(
        new RegExp(`(${safeQ})`, 'gi'),
        '<strong style="color:var(--primary)">$1</strong>'
      );
      const escapedName = r.name.replace(/'/g, "\\'").replace(/[<>"]/g, '');
      return `<div class="autocomplete-item" onclick="searchRegion('${escapedName}')">
        <span>${highlighted}</span>
        <span class="region-type">${r.type === 'province' ? 'Province 省' : 'City 城市'}</span>
      </div>`;
    }).join('');
  }
  autocompleteEl.innerHTML = html;
  autocompleteEl.classList.add('open');
}

// ── GEOCODE + OVERPASS ───────────────────────────
async function searchRegion(name) {
  searchInput.value = name;
  autocompleteEl.classList.remove('open');
  state.currentRegion = name;

  showOverlay(true);
  document.getElementById('resultCountText').innerHTML = T[LANG.current].searching;

  try {
    // 1. Nominatim geocode
    const nominatimUrl = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(name + ' Netherlands')}&format=json&limit=1&addressdetails=1`;
    // Note: User-Agent is a forbidden header in browser fetch — omit it
    const geoRes = await fetch(nominatimUrl);
    const geoData = await geoRes.json();

    if (!geoData.length) {
      showToast(T[LANG.current].regionNotFound);
      showOverlay(false);
      return;
    }

    const place = geoData[0];
    const [s, n, w, e] = place.boundingbox.map(Number);
    const bbox = `${s},${w},${n},${e}`;

    // Fly to region
    map.fitBounds([[s, w], [n, e]], { padding: [20, 20] });

    // 2. Overpass query — tries 3 endpoints automatically on failure
    const overpassQuery = buildOverpassQuery(bbox);
    const osmData = await fetchOverpass(overpassQuery);

    processOSMData(osmData.elements);
    showOverlay(false);

  } catch (err) {
    console.error('Search error:', err);
    showOverlay(false);
    document.getElementById('resultCountText').innerHTML =
      `⚠️ 错误: ${err.message || err} — 请检查网络连接后重试`;
  }
}

const OVERPASS_ENDPOINTS = [
  'https://overpass.kumi.systems/api/interpreter',
  'https://overpass.openstreetmap.fr/api/interpreter',
  'https://overpass-api.de/api/interpreter',
];

function buildOverpassQuery(bbox) {
  const b = bbox;
  // Use regex OR — 15 statements instead of 41, much lighter on the server
  return `[out:json][timeout:60];
(
  node["name"]["tourism"~"museum|gallery|aquarium|zoo|theme_park|attraction|visitor_centre"](${b});
  node["name"]["leisure"~"playground|water_park|ice_rink|miniature_golf|nature_reserve|marina"](${b});
  node["name"]["amenity"~"theatre|cinema"](${b});
  node["name"]["natural"="beach"](${b});
  node["name"]["historic"~"castle|ruins|monument|fort|mill"](${b});
  node["name"]["man_made"="windmill"](${b});
  way["name"]["tourism"~"museum|gallery|aquarium|zoo|theme_park|attraction|visitor_centre"](${b});
  way["name"]["leisure"~"playground|water_park|nature_reserve"](${b});
  way["name"]["amenity"~"theatre|cinema"](${b});
  way["name"]["natural"="beach"](${b});
  way["name"]["historic"~"castle|ruins|fort|mill"](${b});
  way["name"]["man_made"="windmill"](${b});
  relation["name"]["tourism"~"museum|zoo|theme_park"](${b});
  relation["name"]["leisure"="nature_reserve"](${b});
  relation["name"]["natural"="beach"](${b});
);
out center;`;
}

// Netherlands bounding box
const NL_BBOX = '50.75,3.35,53.55,7.22';

// Build Overpass query for a single category across any bbox
function buildCategoryQuery(catId, bbox) {
  const cat = CATEGORIES.find(c => c.id === catId);
  if (!cat) return buildOverpassQuery(bbox);
  const stmts = [];
  Object.entries(cat.tags).forEach(([key, vals]) => {
    const op = vals.length === 1 ? '=' : '~';
    const val = vals.join('|');
    ['node', 'way', 'relation'].forEach(t =>
      stmts.push(`  ${t}["name"]["${key}"${op}"${val}"](${bbox});`)
    );
  });
  return `[out:json][timeout:90];\n(\n${stmts.join('\n')}\n);\nout center;`;
}

// Search entire Netherlands — catId=null means all categories
async function searchNL(catId) {
  const cat = catId ? CATEGORIES.find(c => c.id === catId) : null;
  const regionLabel = cat
    ? (LANG.current === 'zh' ? `${cat.zh} · 荷兰全境` : `${cat.en} · All Netherlands`)
    : (LANG.current === 'zh' ? '荷兰全境' : 'All Netherlands');

  state.currentRegion = regionLabel;
  state.activeCategory = catId;
  state.allVenues = [];
  state.filtered = [];
  state.displayed = 0;
  markersLayer.clearLayers();
  state.markers.clear();

  showOverlay(true);
  document.getElementById('resultCountText').innerHTML = T[LANG.current].searching;
  map.setView([52.35, 5.3], 8);
  searchInput.value = '';

  try {
    const query = catId ? buildCategoryQuery(catId, NL_BBOX) : buildOverpassQuery(NL_BBOX);
    const osmData = await fetchOverpass(query);
    processOSMData(osmData.elements);
    showOverlay(false);
  } catch (err) {
    console.error('NL search error:', err);
    showOverlay(false);
    document.getElementById('resultCountText').innerHTML =
      `⚠️ ${err.message || err} — 请重试`;
  }
}

async function fetchOverpass(query) {
  let lastErr;
  for (let i = 0; i < OVERPASS_ENDPOINTS.length; i++) {
    const url = OVERPASS_ENDPOINTS[i] + '?data=' + encodeURIComponent(query);
    const controller = new AbortController();
    const tid = setTimeout(() => controller.abort(), 35000); // 35s per endpoint
    try {
      const res = await fetch(url, { signal: controller.signal });
      clearTimeout(tid);
      if (res.ok) {
        const json = await res.json();
        if (json.remark && /timed out|timeout/i.test(json.remark)) {
          lastErr = new Error('Server timeout'); continue;
        }
        return json;
      }
      lastErr = new Error(`HTTP ${res.status}`);
    } catch (e) {
      clearTimeout(tid);
      lastErr = e;
    }
  }
  throw lastErr || new Error('All Overpass endpoints failed');
}


function processOSMData(elements) {
  const venues = [];
  const seen = new Set();

  for (const el of elements) {
    const tags = el.tags || {};
    const name = tags.name || tags['name:nl'] || tags['name:en'];
    if (!name) continue;

    const lat = el.lat ?? el.center?.lat;
    const lon = el.lon ?? el.center?.lon;
    if (!lat || !lon) continue;

    const key = `${name.toLowerCase()}-${Math.round(lat*1000)}-${Math.round(lon*1000)}`;
    if (seen.has(key)) continue;
    seen.add(key);

    const cat = getCategoryForVenue(tags);
    const rawWebsite = tags.website || tags['contact:website'] || tags['url'] || '';
    const website = rawWebsite
      ? (rawWebsite.startsWith('http') ? rawWebsite : 'https://' + rawWebsite)
      : '';

    const city = tags['addr:city'] || tags['addr:town'] || tags['addr:village'] || '';
    const street = [tags['addr:street'], tags['addr:housenumber']].filter(Boolean).join(' ');
    const address = [street, city].filter(Boolean).join(', ');

    venues.push({
      id: `${el.type}/${el.id}`,
      name,
      nameZh: tags['name:zh'] || tags['name:zh-Hans'] || '',
      lat, lon,
      category: cat,
      website,
      address,
      phone: tags.phone || tags['contact:phone'] || '',
      openingHours: tags.opening_hours || '',
      osmType: el.type,
      osmId: el.id,
    });
  }

  // Sort: named categories first, then alphabetical
  venues.sort((a, b) => {
    if (a.category.id !== 'attraction' && b.category.id === 'attraction') return -1;
    if (a.category.id === 'attraction' && b.category.id !== 'attraction') return 1;
    return a.name.localeCompare(b.name);
  });

  state.allVenues = venues;
  state.displayed = 0;
  applyFilter();
  buildFilterBar();

  document.getElementById('resultCountText').innerHTML =
    venues.length
      ? T[LANG.current].found(venues.length, state.currentRegion)
      : T[LANG.current].notFound;

  renderCategorySummary();
}

function renderList() {
  const list = document.getElementById('venueList');
  const empty = document.getElementById('emptyState');

  if (state.allVenues.length === 0) {
    empty.style.display = 'flex';
    list.style.display = 'none';
    updateEmptyStateText();
    // Show filter hint if a category chip was somehow triggered
    if (state.activeCategory) {
      const cat = CATEGORIES.find(c => c.id === state.activeCategory);
      document.getElementById('emptyTitle').textContent =
        LANG.current === 'zh' ? '请先搜索地区' : 'Search a region first';
      document.getElementById('emptyDesc').textContent =
        LANG.current === 'zh'
          ? `在上方搜索框输入城市或省份，再按「${cat?.zh || ''}」筛选`
          : `Type a city or province in the search bar above, then filter by "${cat?.en || ''}"`;
    }
    return;
  }
  if (state.filtered.length === 0) {
    // Filter active but no matching venues
    empty.style.display = 'flex';
    list.style.display = 'none';
    const cat = CATEGORIES.find(c => c.id === state.activeCategory);
    const catName = cat ? (LANG.current === 'zh' ? cat.zh : cat.en) : '';
    document.getElementById('emptyTitle').textContent =
      LANG.current === 'zh' ? `${state.currentRegion} 暂无${catName}` : `No ${catName} in ${state.currentRegion}`;
    document.getElementById('emptyDesc').textContent =
      LANG.current === 'zh' ? '试试其他分类，或搜索其他地区。' : 'Try a different category or search another region.';
    return;
  }
  empty.style.display = 'none';
  list.style.display = 'flex';

  const toShow = state.filtered.slice(0, state.displayed + PAGE_SIZE);
  state.displayed = toShow.length;

  const frag = document.createDocumentFragment();

  toShow.forEach(v => {
    const card = document.createElement('div');
    card.className = 'venue-card' + (v.id === state.activeCardId ? ' active' : '');
    card.id = 'card-' + v.id.replace(/[^a-z0-9]/gi, '-');
    const isFav = state.favorites.includes(v.id);
    const distHtml = v._userDist != null ? `<span class="venue-distance">📍 ${v._userDist.toFixed(1)} km</span>` : '';
    card.innerHTML = `
      <button class="venue-fav-btn ${isFav ? 'favorited' : ''}" onclick="event.stopPropagation(); toggleFavorite('${v.id.replace(/'/g,"\\'")}', this)" title="${isFav ? 'Remove favorite' : 'Add favorite'}">${isFav ? '❤️' : '♡'}</button>
      <div class="venue-card-top">
        <div class="venue-icon" style="background:${v.category.bg}">${v.category.emoji}</div>
        <div class="venue-info">
          <div class="venue-name">${v.name}</div>
          ${v.nameZh ? `<div class="venue-name-zh">${v.nameZh}</div>` : ''}
          <div class="venue-meta">
            <span class="venue-tag" style="background:${v.category.bg};color:${v.category.color}">
              ${LANG.current === 'zh' ? v.category.zh : v.category.en}
            </span>
            ${distHtml}
            ${v.address ? `<span class="venue-address">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="4" r="2.5" stroke="currentColor" stroke-width="1.2"/><path d="M5 10 C2 7 0.5 5.5 0.5 4a4.5 4.5 0 019 0c0 1.5-1.5 3-4.5 6z" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
              ${v.address}
            </span>` : ''}
          </div>
          ${v.openingHours ? `<div class="venue-detail-row">\u{1F552} ${translateHours(v.openingHours)}</div>` : ''}
          ${v.phone ? `<div class="venue-detail-row">\u{1F4DE} <a href="tel:${v.phone}">${v.phone}</a></div>` : ''}
        </div>
      </div>
      <div class="venue-actions">
        ${v.website
          ? `<a class="btn-website" href="${v.website}" target="_blank" rel="noopener">${T[LANG.current].website}</a>`
          : `<span class="btn-website" style="opacity:.45;cursor:default">${T[LANG.current].noWebsite}</span>`
        }
        <a class="btn-nav" href="https://www.google.com/maps/dir/?api=1&destination=${v.lat},${v.lon}" target="_blank" rel="noopener">${T[LANG.current].navigate}</a>
        <button class="btn-map" onclick="flyToVenue('${v.id}')">${T[LANG.current].flyTo}</button>
      </div>
    `;
    card.addEventListener('click', e => {
      if (e.target.closest('a,button')) return;
      selectVenue(v.id);
    });
    frag.appendChild(card);
  });

  list.innerHTML = '';
  list.appendChild(frag);

  if (state.displayed < state.filtered.length) {
    const btn = document.createElement('button');
    btn.className = 'load-more-btn';
    btn.textContent = `${T[LANG.current].loadMore} (${state.filtered.length - state.displayed} more)`;
    btn.onclick = () => { renderList(); };
    list.appendChild(btn);
  }
}

function renderCategorySummary() {
  const el = document.getElementById('categorySummary');
  if (!state.allVenues.length) { el.innerHTML = ''; return; }
  const counts = {};
  state.allVenues.forEach(v => { counts[v.category.id] = (counts[v.category.id] || 0) + 1; });
  el.innerHTML = CATEGORIES
    .filter(cat => counts[cat.id])
    .map(cat => `<span class="category-summary-chip" style="background:${cat.bg};color:${cat.color}">
      ${cat.emoji} ${counts[cat.id]}
    </span>`).join('');
}

function updateEmptyStateText() {
  document.getElementById('emptyTitle').textContent = T[LANG.current].emptyTitle;
  document.getElementById('emptyDesc').textContent = T[LANG.current].emptyDesc;
}

// ── RENDER MARKERS ───────────────────────────────
const _iconCache = {};
function getIcon(cat) {
  if (!_iconCache[cat.id]) {
    _iconCache[cat.id] = L.divIcon({
      html: `<div class="map-marker" style="background:${cat.color}"><div class="map-marker-inner">${cat.emoji}</div></div>`,
      className: '', iconSize: [34, 34], iconAnchor: [17, 34], popupAnchor: [0, -36],
    });
  }
  return _iconCache[cat.id];
}

function renderMarkers() {
  markersLayer.clearLayers();
  state.markers.clear();

  const batch = [];
  state.filtered.forEach(v => {
    const marker = L.marker([v.lat, v.lon], { icon: getIcon(v.category) });
    marker.bindPopup(() => buildPopup(v), { maxWidth: 280, minWidth: 260 });
    marker.on('click', () => selectVenue(v.id));
    state.markers.set(v.id, marker);
    batch.push(marker);
  });
  markersLayer.addLayers(batch);
}

function buildPopup(v) {
  return `<div class="popup-content">
    <div class="popup-header">
      <div class="popup-icon" style="background:${v.category.bg}">${v.category.emoji}</div>
      <div>
        <div class="popup-name">${v.name}</div>
        ${v.nameZh ? `<div class="popup-name-zh">${v.nameZh}</div>` : ''}
      </div>
    </div>
    ${v.address ? `<div class="popup-address">\u{1F4CD} ${v.address}</div>` : ''}
    ${v.openingHours ? `<div class="popup-address">\u{1F552} ${translateHours(v.openingHours)}</div>` : ''}
    ${v.phone ? `<div class="popup-address">\u{1F4DE} <a href="tel:${v.phone}" style="color:var(--primary);text-decoration:none">${v.phone}</a></div>` : ''}
    <div style="display:flex;gap:6px">
      ${v.website
        ? `<a class="popup-website" href="${v.website}" target="_blank" rel="noopener" style="flex:1">${T[LANG.current].website}</a>`
        : ''
      }
      <a class="popup-website" href="https://www.google.com/maps/dir/?api=1&destination=${v.lat},${v.lon}" target="_blank" rel="noopener" style="flex:1;background:#4285F4">${T[LANG.current].navigate}</a>
    </div>
  </div>`;
}

// ── VENUE SELECTION ──────────────────────────────
function selectVenue(id) {
  state.activeCardId = id;
  // Highlight card
  document.querySelectorAll('.venue-card').forEach(c => c.classList.remove('active'));
  const cardEl = document.getElementById('card-' + id.replace(/[^a-z0-9]/gi, '-'));
  if (cardEl) {
    cardEl.classList.add('active');
    cardEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  // Open marker popup
  const marker = state.markers.get(id);
  if (marker) { marker.openPopup(); }
}

function flyToVenue(id) {
  const v = state.allVenues.find(x => x.id === id);
  if (!v) return;
  map.flyTo([v.lat, v.lon], 16, { duration: 1 });
  selectVenue(id);
}

// ── OVERLAY ──────────────────────────────────────
function showOverlay(show) {
  const overlay = document.getElementById('mapOverlay');
  document.getElementById('loadingText').textContent = T[LANG.current].loadingVenues;
  document.getElementById('loadingHint').textContent = show ? T[LANG.current].loadingHint : '';
  overlay.classList.toggle('hidden', !show);
}

// ── LANGUAGE ─────────────────────────────────────
function setLang(lang) {
  LANG.current = lang;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  document.getElementById('searchInput').placeholder = T[lang].searchPlaceholder;
  updateEmptyStateText();
  buildFilterBar();
  if (state.allVenues.length) {
    document.getElementById('resultCountText').innerHTML =
      T[lang].found(state.filtered.length, state.currentRegion);
    renderList();
    renderMarkers();
    renderCategorySummary();
  } else {
    document.getElementById('resultCountText').textContent = T[lang].resultLabel;
  }
}

// ── SKELETON LOADING ─────────────────────────────
function showSkeletons() {
  const list = document.getElementById('venueList');
  document.getElementById('emptyState').style.display = 'none';
  list.style.display = 'flex';
  list.innerHTML = Array(4).fill(0).map(() => `
    <div class="skeleton-card">
      <div style="display:flex;gap:11px;align-items:center">
        <div class="skeleton" style="width:36px;height:36px;border-radius:50%;flex-shrink:0"></div>
        <div style="flex:1">
          <div class="skeleton" style="height:12px;margin-bottom:8px;width:70%"></div>
          <div class="skeleton" style="height:10px;width:45%"></div>
        </div>
      </div>
    </div>
  `).join('');
}

// Override searchRegion to show skeletons
const _origSearch = searchRegion;
window.searchRegion = async (name) => {
  showSkeletons();
  await _origSearch(name);
};

function haversine(lat1,lon1,lat2,lon2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function parseUserMessage(msg) {
  const lower = msg.toLowerCase();
  const result = { city: null, coords: null, categories: new Set(), age: null, maxDist: null, raw: msg };

  // Detect city
  for (const [name, coords] of Object.entries(CITY_COORDS)) {
    if (lower.includes(name.toLowerCase())) {
      result.city = name;
      result.coords = coords;
      break;
    }
  }

  // Detect interests
  for (const [kw, cats] of Object.entries(INTEREST_MAP)) {
    if (lower.includes(kw.toLowerCase())) {
      cats.forEach(c => result.categories.add(c));
    }
  }

  // Detect age
  for (const [kw, age] of Object.entries(AGE_HINTS)) {
    if (lower.includes(kw)) { result.age = age; break; }
  }

  // Detect distance preference
  const distMatch = lower.match(/(\d+)\s*(km|公里|分钟|min)/);
  if (distMatch) {
    const num = parseInt(distMatch[1]);
    if (distMatch[2] === '分钟' || distMatch[2] === 'min') {
      result.maxDist = num * 1.2; // ~1.2km per minute driving
    } else {
      result.maxDist = num;
    }
  }

  return result;
}

function recommendVenues(parsed) {
  let venues = [...STATIC_NL_VENUES].map(v => {
    const tags = v.tags || {};
    const cat = getCategoryForVenue(tags);
    return { ...v, _cat: cat, _name: tags.name, _city: tags['addr:city'] || '' };
  });

  // Filter by category if specified
  if (parsed.categories.size > 0) {
    venues = venues.filter(v => parsed.categories.has(v._cat.id));
  }

  // Calculate distance if location specified
  if (parsed.coords) {
    venues.forEach(v => {
      v._dist = haversine(parsed.coords[0], parsed.coords[1], v.lat, v.lon);
    });
    // Filter by max distance
    if (parsed.maxDist) {
      venues = venues.filter(v => v._dist <= parsed.maxDist);
    }
    // Sort by distance
    venues.sort((a, b) => a._dist - b._dist);
  } else {
    // Random shuffle for variety
    venues.sort(() => Math.random() - 0.5);
  }

  // Age-based adjustments
  if (parsed.age !== null) {
    if (parsed.age <= 3) {
      // Prioritize farms, indoor playgrounds, small playgrounds
      const priority = ['children_farm', 'indoor_playground', 'playground', 'zoo'];
      venues.sort((a, b) => {
        const aP = priority.indexOf(a._cat.id);
        const bP = priority.indexOf(b._cat.id);
        if (aP >= 0 && bP < 0) return -1;
        if (aP < 0 && bP >= 0) return 1;
        return (a._dist || 0) - (b._dist || 0);
      });
    } else if (parsed.age >= 8) {
      // Prioritize theme parks, sports, museums
      const priority = ['theme_park', 'sports', 'museum', 'historic'];
      venues.sort((a, b) => {
        const aP = priority.indexOf(a._cat.id);
        const bP = priority.indexOf(b._cat.id);
        if (aP >= 0 && bP < 0) return -1;
        if (aP < 0 && bP >= 0) return 1;
        return (a._dist || 0) - (b._dist || 0);
      });
    }
  }

  return venues.slice(0, 6);
}

function buildChatResponse(parsed, venues) {
  const isZh = /[\u4e00-\u9fff]/.test(parsed.raw);
  let parts = [];

  if (venues.length === 0) {
    return isZh
      ? '抱歉，没有找到完全匹配的场地。试试换个关键词或放宽距离范围？'
      : "Sorry, no exact matches found. Try different keywords or a wider range?";
  }

  // Opening line
  if (isZh) {
    let opener = '为你推荐以下场地';
    if (parsed.city) opener = `在 ${parsed.city} 附近为你推荐`;
    if (parsed.age) opener += `（适合${parsed.age}岁孩子）`;
    opener += '：';
    parts.push(opener);
  } else {
    let opener = 'Here are my recommendations';
    if (parsed.city) opener = `Near ${parsed.city}, here are my picks`;
    if (parsed.age) opener += ` (for age ${parsed.age})`;
    opener += ':';
    parts.push(opener);
  }

  // Venue list
  venues.forEach((v, i) => {
    const dist = v._dist ? ` (${v._dist.toFixed(1)}km)` : '';
    const catLabel = isZh ? v._cat.zh : v._cat.en;
    parts.push(`\n${v._cat.emoji} <strong>${v._name}</strong>${dist}\n<span style="color:var(--text-muted);font-size:11px">${catLabel} · ${v._city}</span>`);
  });

  // Tips
  if (isZh) {
    if (parsed.age && parsed.age <= 3) parts.push('\n💡 小贴士：低龄宝宝推荐儿童农场和室内游乐场，安全又有趣！');
    if (parsed.categories.has('indoor_playground')) parts.push('\n💡 Monkey Town 和 Ballorig 在荷兰各地都有分店，是雨天遛娃首选！');
    parts.push('\n点击场地名称可在地图上查看位置。');
  } else {
    if (parsed.age && parsed.age <= 3) parts.push("\n💡 Tip: Children's farms and indoor playgrounds are great for toddlers!");
    parts.push('\nClick a venue name to see it on the map.');
  }

  return parts.join('');
}

// Chat UI logic
let chatOpen = false;

function toggleChat(open) {
  chatOpen = open;
  document.getElementById('chatPanel').classList.toggle('open', open);
  document.getElementById('chatFab').classList.toggle('hidden', open);
  if (open && document.getElementById('chatMessages').children.length === 0) {
    initChat();
  }
  if (open) document.getElementById('chatInput').focus();
}

function initChat() {
  const isZh = LANG.current === 'zh';
  addBotMessage(isZh
    ? '👋 你好！我是亲子出行助手。\n\n告诉我你的情况，比如：\n• 你在哪个城市？\n• 孩子多大？\n• 想要室内还是室外？\n• 对什么感兴趣？\n\n我会根据你的需求推荐最合适的去处！'
    : "👋 Hi! I'm your family outing assistant.\n\nTell me about your situation:\n• Which city are you in?\n• How old are your kids?\n• Indoor or outdoor?\n• Any interests?\n\nI'll recommend the best places for your family!"
  );
  showQuickActions(isZh);
}

function showQuickActions(isZh) {
  const el = document.getElementById('chatQuickActions');
  const actions = isZh
    ? [
        ['🏠 Amsterdam室内玩', '我在Amsterdam，下雨天想找室内游乐场'],
        ['🦁 带3岁宝宝看动物', '我孩子3岁，想去看动物，在Rotterdam附近'],
        ['🏖️ 周末海滩推荐', '周末想带孩子去海滩，从Den Haag出发'],
        ['🏛️ 博物馆推荐', '想带8岁孩子去博物馆，在Utrecht'],
      ]
    : [
        ['🏠 Indoor Amsterdam', 'Indoor activities in Amsterdam for rainy day'],
        ['🦁 Zoo near Rotterdam', 'Zoo or farm near Rotterdam for 3 year old'],
        ['🏖️ Beach trip', 'Beach near Den Haag for kids'],
        ['🏛️ Museum Utrecht', 'Museum for 8 year old near Utrecht'],
      ];
  el.innerHTML = actions.map(([label, msg]) =>
    `<button class="chat-quick-btn" onclick="sendQuickMsg('${msg.replace(/'/g,"\\'")}')">${label}</button>`
  ).join('');
}

function sendQuickMsg(msg) {
  document.getElementById('chatInput').value = msg;
  handleChatSend();
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function addBotMessage(text) {
  const el = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg bot';
  div.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function addUserMessage(text) {
  const el = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg user';
  div.textContent = text;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function showTyping() {
  const el = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-typing';
  div.id = 'chatTyping';
  div.innerHTML = '<span></span><span></span><span></span>';
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('chatTyping');
  if (t) t.remove();
}

function handleChatSend() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;

  addUserMessage(msg);
  input.value = '';

  // Hide quick actions after first message
  document.getElementById('chatQuickActions').innerHTML = '';

  showTyping();

  setTimeout(() => {
    removeTyping();
    const parsed = parseUserMessage(msg);
    const venues = recommendVenues(parsed);
    const response = buildChatResponse(parsed, venues);

    // Build clickable venue chips
    let venueChips = '';
    if (venues.length > 0) {
      venueChips = '<div style="margin-top:8px">' + venues.map(v =>
        `<span class="chat-venue-chip" onclick="chatShowVenue(${v.lat},${v.lon},'${v._name.replace(/'/g,"\\'")}')">${v._cat.emoji} ${v._name}</span>`
      ).join('') + '</div>';
    }

    addBotMessage(response + venueChips);
  }, 600 + Math.random() * 400);
}

function chatShowVenue(lat, lon, name) {
  map.flyTo([lat, lon], 14, { duration: 1 });
  // Try to find and select the venue
  const v = state.allVenues.find(x => x.name === name);
  if (v) selectVenue(v.id);
  // Close chat on mobile
  if (window.innerWidth <= 768) toggleChat(false);
}

// Chat input enter key
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); handleChatSend(); }
});

// ── FAVORITES ───────────────────────────────────
function toggleFavorite(venueId, btnEl) {
  const idx = state.favorites.indexOf(venueId);
  if (idx >= 0) {
    state.favorites.splice(idx, 1);
    if (btnEl) { btnEl.classList.remove('favorited'); btnEl.textContent = '\u2661'; }
  } else {
    state.favorites.push(venueId);
    if (btnEl) { btnEl.classList.add('favorited'); btnEl.textContent = '\u2764\uFE0F'; }
  }
  if (btnEl) {
    btnEl.classList.remove('bounce');
    void btnEl.offsetWidth;
    btnEl.classList.add('bounce');
  }
  localStorage.setItem('kids-explorer-favorites', JSON.stringify(state.favorites));
  buildFilterBar();
  if (state.showFavoritesOnly) {
    state.displayed = 0;
    applyFilter();
  }
}

function toggleFavoritesFilter() {
  state.showFavoritesOnly = !state.showFavoritesOnly;
  if (state.showFavoritesOnly) {
    state.activeCategory = null;
  }
  state.displayed = 0;
  applyFilter();
  buildFilterBar();
}

// ── VENUE SEARCH FROM AUTOCOMPLETE ──────────────
function searchVenueFromAutocomplete(lat, lon, venueId, venueName) {
  autocompleteEl.classList.remove('open');
  searchInput.value = venueName;
  map.flyTo([lat, lon], 16, { duration: 1 });
  const v = state.allVenues.find(x => x.id === venueId);
  if (v) {
    selectVenue(v.id);
  } else {
    L.popup()
      .setLatLng([lat, lon])
      .setContent(`<div class="popup-content"><div class="popup-name">${escapeHtml(venueName)}</div></div>`)
      .openOn(map);
  }
}

// ── GEOLOCATION (NEAR ME) ───────────────────────
function activateNearMe() {
  autocompleteEl.classList.remove('open');
  const btn = document.getElementById('nearmeBtn');
  if (!navigator.geolocation) {
    showToast(T[LANG.current].nearMeError);
    return;
  }
  btn.classList.add('active');
  showToast(T[LANG.current].nearMeSearching, 2000);
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      state.userLocation = [lat, lon];
      if (state.userLocationMarker) {
        map.removeLayer(state.userLocationMarker);
      }
      state.userLocationMarker = L.circleMarker([lat, lon], {
        radius: 10, color: '#4285F4', fillColor: '#4285F4',
        fillOpacity: 0.5, weight: 3, opacity: 0.8,
      }).addTo(map).bindPopup(LANG.current === 'zh' ? '📍 你的位置' : '📍 Your location');
      state.displayed = 0;
      applyFilter();
      buildFilterBar();
      map.flyTo([lat, lon], 11, { duration: 1 });
      showToast(LANG.current === 'zh' ? '已按距离排序' : 'Sorted by distance', 2000);
    },
    (err) => {
      btn.classList.remove('active');
      if (err.code === 1) {
        showToast(T[LANG.current].nearMePermDenied, 4000);
      } else {
        showToast(T[LANG.current].nearMeError);
      }
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// ── INIT ─────────────────────────────────────────
buildFilterBar();
setLang('en');
loadStaticVenues();
</script>

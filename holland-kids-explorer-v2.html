<style>
:root{
  --bg:#ffffff;--bg-soft:#f7f7f7;--border:#ebebeb;--border-strong:#dddddd;
  --text:#222222;--text-soft:#717171;
  --rausch:#ff385c;--rausch-dark:#e31c5f;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}

.topnav{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:14px 0}
.topnav-inner{max-width:1280px;margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between;gap:24px}
.brand{display:flex;align-items:center;gap:8px;font-size:22px;font-weight:800;color:var(--rausch);letter-spacing:-.5px}
.brand-icon{font-size:26px}
.search-bar{flex:1;max-width:520px;display:flex;align-items:center;gap:0;border:1px solid var(--border-strong);border-radius:999px;padding:4px 4px 4px 20px;box-shadow:0 1px 2px rgba(0,0,0,.08);transition:box-shadow .2s}
.search-bar:hover{box-shadow:0 4px 14px rgba(0,0,0,.12)}
.search-bar input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;color:var(--text);padding:10px 0;background:transparent}
.search-bar input::placeholder{color:var(--text-soft)}
.search-btn{width:40px;height:40px;border-radius:50%;background:var(--rausch);color:#fff;border:none;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0}
.nav-right{display:flex;align-items:center;gap:6px}
.nav-link{padding:10px 14px;font-size:14px;font-weight:600;border-radius:999px;color:var(--text);cursor:pointer;background:none;border:none;font-family:inherit}
.nav-link:hover{background:var(--bg-soft)}
.nav-link.active{background:var(--text);color:#fff}

.filter-bar{border-bottom:1px solid var(--border);background:#fff;position:sticky;top:69px;z-index:50}
.filter-inner{max-width:1280px;margin:0 auto;padding:16px 40px;display:flex;align-items:center;gap:28px;overflow-x:auto;scrollbar-width:none}
.filter-inner::-webkit-scrollbar{display:none}
.cat-pill{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 4px;cursor:pointer;color:var(--text-soft);border-bottom:2px solid transparent;transition:all .15s;flex-shrink:0;min-width:68px;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.cat-pill:hover{color:var(--text);border-bottom-color:var(--border-strong)}
.cat-pill.active{color:var(--text);border-bottom-color:var(--text)}
.cat-icon{font-size:22px;line-height:1}
.cat-label{font-size:11px;font-weight:600;letter-spacing:.02em;white-space:nowrap}
.cat-count{font-size:10px;color:var(--text-soft);font-weight:500}

.container{max-width:1280px;margin:0 auto;padding:32px 40px 80px}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.section-head h1{font-size:26px;font-weight:700;letter-spacing:-.5px}
.section-head .count{font-size:14px;color:var(--text-soft);font-weight:500}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:32px 22px}
.card{cursor:pointer;display:block}

.cover{position:relative;width:100%;aspect-ratio:4/3;border-radius:16px;overflow:hidden;margin-bottom:12px;display:flex;align-items:center;justify-content:center;transition:transform .25s ease}
.card:hover .cover{transform:translateY(-4px)}
.cover::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.35),transparent 60%)}
.cover::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.12) 100%)}
.cover-emoji{position:relative;z-index:2;font-size:80px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.2));line-height:1}
.cover-logo{position:relative;z-index:2;width:108px;height:108px;border-radius:22px;background:rgba(255,255,255,.96);display:flex;align-items:center;justify-content:center;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.18);overflow:hidden}
.cover-logo img{max-width:100%;max-height:100%;object-fit:contain}
.cover-badge{position:absolute;top:12px;left:12px;z-index:3;background:rgba(255,255,255,.95);padding:5px 11px;border-radius:999px;font-size:11px;font-weight:600;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.12);letter-spacing:.02em}
.cover-fav{position:absolute;top:12px;right:12px;z-index:3;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:19px;color:rgba(255,255,255,.98);text-shadow:0 1px 4px rgba(0,0,0,.35);cursor:pointer;background:none;border:none;padding:0}
.cover-fav.fav-on{color:var(--rausch);text-shadow:0 1px 4px rgba(0,0,0,.2)}
.cover-city{position:absolute;bottom:12px;left:12px;z-index:3;color:#fff;font-size:12px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.4);letter-spacing:.02em}

.cover[data-cat="theme_park"]{background:linear-gradient(135deg,#ff9a56,#ff6b9d)}
.cover[data-cat="zoo"]{background:linear-gradient(135deg,#22c55e,#059669)}
.cover[data-cat="aquarium"]{background:linear-gradient(135deg,#06b6d4,#0369a1)}

.cover[data-cat="swim"]{background:linear-gradient(135deg,#06b6d4,#0369a1)}
.cover[data-cat="indoor_play"]{background:linear-gradient(135deg,#a855f7,#7e22ce)}
.cover[data-cat="trampoline"]{background:linear-gradient(135deg,#ec4899,#be185d)}
.cover[data-cat="climbing"]{background:linear-gradient(135deg,#f59e0b,#b45309)}
.cover[data-cat="karting"]{background:linear-gradient(135deg,#ef4444,#991b1b)}
.cover[data-cat="minigolf"]{background:linear-gradient(135deg,#10b981,#047857)}
.cover[data-cat="ice_rink"]{background:linear-gradient(135deg,#60a5fa,#1d4ed8)}
.cover[data-cat="farm"]{background:linear-gradient(135deg,#a3e635,#65a30d)}
.cover[data-cat="attraction"]{background:linear-gradient(135deg,#fb923c,#c2410c)}
.cover[data-cat="theatre"]{background:linear-gradient(135deg,#d946ef,#86198f)}
.cover[data-cat="cinema"]{background:linear-gradient(135deg,#64748b,#334155)}
.cover[data-cat="restaurant"]{background:linear-gradient(135deg,#f87171,#b91c1c)}
.cover[data-cat="other"]{background:linear-gradient(135deg,#94a3b8,#475569)}

.card-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-name{font-size:15px;font-weight:600;color:var(--text);line-height:1.3;letter-spacing:-.1px}
.card-name-zh{font-size:13px;color:var(--text-soft);margin-top:2px}
.card-rating{display:flex;align-items:center;gap:4px;font-size:14px;color:var(--text);font-weight:500;flex-shrink:0;white-space:nowrap}
.card-meta{font-size:13px;color:var(--text-soft);margin-top:4px}

footer{border-top:1px solid var(--border);background:var(--bg-soft);padding:36px;text-align:center;font-size:13px;color:var(--text-soft)}
footer a{color:var(--rausch);font-weight:600}

.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-soft);font-size:15px}

@media (max-width:768px){
  .topnav-inner{padding:0 16px;flex-wrap:wrap;gap:10px}
  .brand{order:1;flex:1}
  .nav-right{order:2}
  .search-bar{order:3;width:100%;max-width:none;flex:1 0 100%}
  .container{padding:24px 16px 60px}
  .filter-inner{padding:14px 16px;gap:22px}
  .cover-emoji{font-size:68px}
  .cover-logo{width:92px;height:92px;padding:14px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:22px 14px}
  .section-head h1{font-size:20px}
}
</style>
</head>

// ===== Category config =====
const CATS = {
  all:          {emoji:'✨', en:'All',          zh:'全部'},
  theme_park:   {emoji:'🎢', en:'Theme parks',  zh:'主题乐园'},
  zoo:          {emoji:'🦒', en:'Zoos',         zh:'动物园'},
  aquarium:     {emoji:'🐠', en:'Aquariums',    zh:'水族馆'},
  museum:       {emoji:'🏛️', en:'Museums',      zh:'博物馆'},
  nature:       {emoji:'🌳', en:'Nature',       zh:'自然'},
  beach:        {emoji:'🏖️', en:'Beaches',      zh:'海滩'},
  playground:   {emoji:'🎪', en:'Playgrounds',  zh:'游乐场'},
  indoor_play:  {emoji:'🏠', en:'Indoor play',  zh:'室内游乐'},
  trampoline:   {emoji:'🤸', en:'Trampoline',   zh:'蹦床'},
  swim:         {emoji:'🏊', en:'Swimming',     zh:'游泳'},
  climbing:     {emoji:'🧗', en:'Climbing',     zh:'攀爬'},
  karting:      {emoji:'🏎️', en:'Karting',      zh:'卡丁车'},
  minigolf:     {emoji:'⛳', en:'Minigolf',     zh:'迷你高尔夫'},
  ice_rink:     {emoji:'⛸️', en:'Ice rink',     zh:'滑冰场'},
  farm:         {emoji:'🐑', en:'Farms',        zh:'农场'},
  attraction:   {emoji:'⭐', en:'Attractions',  zh:'景点'},
  theatre:      {emoji:'🎭', en:'Theatre',      zh:'剧院'},
  cinema:       {emoji:'🎬', en:'Cinema',       zh:'电影院'},
  restaurant:   {emoji:'🍽️', en:'Family dining',zh:'亲子餐厅'},
  other:        {emoji:'📍', en:'Other',        zh:'其他'}
};

// ===== Map OSM tags → my category =====
function classify(t){
  if(t.tourism==='theme_park') return 'theme_park';
  if(t.tourism==='zoo' || t.tourism==='children_farm') return t.tourism==='children_farm'?'farm':'zoo';
  if(t.tourism==='aquarium') return 'aquarium';
  if(t.tourism==='museum') return 'museum';
  if(t.tourism==='attraction' || t.tourism==='visitor_centre') return 'attraction';
  if(t.leisure==='nature_reserve' || t.leisure==='park') return 'nature';
  if(t.leisure==='playground') return 'playground';
  if(t.leisure==='indoor_playground') return 'indoor_play';
  if(t.leisure==='trampoline_park') return 'trampoline';
  if(t.leisure==='swimming_pool') return 'swim';
  if(t.leisure==='climbing_park') return 'climbing';
  if(t.leisure==='go_kart') return 'karting';
  if(t.leisure==='miniature_golf') return 'minigolf';
  if(t.leisure==='ice_rink') return 'ice_rink';
  if(t.amenity==='theatre') return 'theatre';
  if(t.amenity==='cinema') return 'cinema';
  if(t.amenity && t.amenity.indexOf('restaurant')>=0) return 'restaurant';
  return 'other';
}

// ===== Extract clean domain from website URL =====
function extractDomain(url){
  if(!url) return '';
  try{
    const u = new URL(url.startsWith('http')?url:'https://'+url);
    return u.hostname.replace(/^www\./,'');
  }catch(e){ return ''; }
}

// ===== Transform raw venues =====
const VENUES = STATIC_NL_VENUES.map(v=>{
  const t = v.tags || {};
  const cat = classify(t);
  return {
    id:v.id,
    name:t.name || 'Unnamed',
    nameZh:t.nameZh || '',
    cat:cat,
    emoji:CATS[cat]?.emoji || '📍',
    city:t['addr:city'] || '',
    domain:extractDomain(t.website),
    rating:parseFloat(t.rating || '0') || null,
    reviews:parseInt(t.reviews || '0') || 0,
    hours:t.opening_hours || ''
  };
}).sort((a,b)=>(b.rating||0)-(a.rating||0) || b.reviews-a.reviews);

// ===== State =====
let state = { cat:'all', q:'', lang:'en', favs:new Set(JSON.parse(localStorage.getItem('khx_favs')||'[]')) };

// ===== Category counts + filter bar =====
function buildFilterBar(){
  const counts = {all:VENUES.length};
  VENUES.forEach(v=>{counts[v.cat]=(counts[v.cat]||0)+1;});
  const order = ['all','theme_park','zoo','museum','nature','playground','indoor_play','swim','aquarium','beach','climbing','trampoline','farm','attraction','karting','minigolf','ice_rink','theatre','cinema','restaurant','other'];
  const bar = document.getElementById('filter-inner');
  bar.innerHTML = '';
  order.forEach(k=>{
    if(!counts[k]) return;
    const btn = document.createElement('button');
    btn.className = 'cat-pill' + (state.cat===k?' active':'');
    btn.dataset.cat = k;
    btn.innerHTML = `<div class="cat-icon">${CATS[k].emoji}</div><div class="cat-label">${CATS[k][state.lang]}</div><div class="cat-count">${counts[k]}</div>`;
    btn.addEventListener('click',()=>{state.cat=k;render();});
    bar.appendChild(btn);
  });
}

// ===== Render grid =====
function render(){
  buildFilterBar();
  const grid = document.getElementById('grid');
  const q = state.q.trim().toLowerCase();
  let list = VENUES.filter(v=>{
    if(state.cat!=='all' && v.cat!==state.cat) return false;
    if(q && !(v.name.toLowerCase().includes(q) || v.nameZh.includes(q) || (v.city||'').toLowerCase().includes(q))) return false;
    return true;
  });
  document.getElementById('section-count').textContent = `${list.length} ${state.lang==='en'?'venues':'场所'}${state.cat==='all'?'':' · '+CATS[state.cat][state.lang]}`;
  document.getElementById('section-title').textContent = state.lang==='en'
    ? 'Family-friendly places across the Netherlands'
    : '荷兰亲子好去处';
  if(!list.length){
    grid.innerHTML = `<div class="empty">${state.lang==='en'?'No venues match your search.':'没有找到匹配的场所。'}</div>`;
    return;
  }
  grid.innerHTML = '';
  list.slice(0,300).forEach(v=>{
    const card = document.createElement('a');
    card.className = 'card';
    card.href = '#';
    const clearbit = v.domain ? `https://logo.clearbit.com/${v.domain}` : '';
    const favicon  = v.domain ? `https://www.google.com/s2/favicons?domain=${v.domain}&sz=128` : '';
    const logoHTML = v.domain
      ? `<div class="cover-logo"><img src="${clearbit}" alt="" loading="lazy"
           onerror="if(this.dataset.fb!=='1'){this.dataset.fb='1';this.src='${favicon}';}else{this.parentElement.outerHTML='<div class=\\'cover-emoji\\'>${v.emoji}</div>';}"></div>`
      : `<div class="cover-emoji">${v.emoji}</div>`;
    const displayName = state.lang==='zh' && v.nameZh ? v.nameZh : v.name;
    const subName = state.lang==='zh' ? (v.name!==v.nameZh?v.name:'') : v.nameZh;
    const catLabel = CATS[v.cat][state.lang];
    const isFav = state.favs.has(v.id);
    card.innerHTML = `
      <div class="cover" data-cat="${v.cat}">
        <span class="cover-badge">${v.emoji} ${catLabel}</span>
        <button class="cover-fav ${isFav?'fav-on':''}" data-id="${v.id}" aria-label="Favorite">${isFav?'♥':'♡'}</button>
        ${logoHTML}
        ${v.city?`<div class="cover-city">📍 ${v.city}</div>`:''}
      </div>
      <div class="card-row1">
        <div style="min-width:0;flex:1">
          <div class="card-name">${displayName}</div>
          ${subName?`<div class="card-name-zh">${subName}</div>`:''}
        </div>
        ${v.rating?`<div class="card-rating">★ ${v.rating.toFixed(1)}</div>`:''}
      </div>
      ${v.reviews?`<div class="card-meta">${v.reviews.toLocaleString()} ${state.lang==='en'?'reviews':'评价'}</div>`:''}
    `;
    card.querySelector('.cover-fav').addEventListener('click',ev=>{
      ev.preventDefault();ev.stopPropagation();
      if(state.favs.has(v.id)) state.favs.delete(v.id); else state.favs.add(v.id);
      localStorage.setItem('khx_favs',JSON.stringify([...state.favs]));
      render();
    });
    grid.appendChild(card);
  });
}

// ===== Search + language =====
document.getElementById('search').addEventListener('input',e=>{state.q=e.target.value;render();});
document.getElementById('lang-en').addEventListener('click',()=>{state.lang='en';document.getElementById('lang-en').classList.add('active');document.getElementById('lang-zh').classList.remove('active');render();});
document.getElementById('lang-zh').addEventListener('click',()=>{state.lang='zh';document.getElementById('lang-zh').classList.add('active');document.getElementById('lang-en').classList.remove('active');render();});

render();
</script>
